<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Atlas - Explore</title>
  <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

  <header class="explore-header">
    <h1>Explore</h1>
  </header>

  <!-- MAIN SYSTEM WRAPPER -->
   <main class="explore-layout">
    
    <!-- NODE MAP AREA -->
     <section class="map-area">

      <div class="node" data-genre="afrobeats">Afrobeats</div>
      <div class="node" data-genre="jazz">Jazz</div>
      <div class="node" data-genre="uk-hiphop">UK Rap</div>
      <div class="node" data-genre="reggae">Reggae</div>

     </section>

     <!-- SIDE PANEL (hidden until click later with JS) -->
      <aside class="side-panel">
        <h2>Genre Title</h2>
        <p>Genre descriptions appears here when clicked.</p>
      </aside>

      <aside class="comparison-panel">
        <h2>comparison Mode</h2>
        <p>Compare two selected genres here.</p>
      </aside>

   </main>

</body>
</html>
