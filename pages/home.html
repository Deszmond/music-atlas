<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Atlas - Home</title>
  <link rel="stylesheet" href="../styles/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>

<body>
  <main class="page-content">

    <header class="home-header">
      <h1 class="logo">Music Atlas</h1>
      <p class="subtitle">Explore global music cultures</p>
    </header>

    <section class="search-container">
      <input class="search-bar" type="text" placeholder="Search genres..."/>
    </section>

    <section class="cta-section">
      <a class="cta-button" href="explore.html">Enter Explore Map</a>
    </section>


    <section class="genre-scroll">

      <div class="genre-box">
        <div class="genre-card genre-card--afrobeats">
          <img src="/assets/Card Images/wizkid-2021-thatgrapejuice-removebg-preview.png" alt="WizKid" data-genre="afrobeats">
        </div>
        <h3>Afrobeats</h3>
      </div>

      <div class="genre-box">
        <div class="genre-card genre-card--gospel">
          <img src="/assets/Card Images/Kierra sheard.png" alt="Kierra sheard" data-genre="gospel">
        </div>
        <h3>Gospel</h3>
      </div>

      <div class="genre-box">
        <div class="genre-card genre-card--uk-rap">
          <img src="/assets/Card Images/Little-Simz-Cover-Blank-removebg-preview.png" alt="Little Simz" data-genre="ukrap">
        </div>
        <h3>Uk Rap</h3>
      </div>

      <div class="genre-box">
        <div class="genre-card genre-card--reggae">
          <img src="/assets/Card Images/chronixx.png" alt="Chronixx" data-genre="reggae">
        </div>
        <h3>Reggae</h3>
      </div>
      
      <div class="genre-box">
        <div class="genre-card genre-card--amapiano">
          <img src="/assets/Card Images/waffles-Max-Banner-removebg-preview.png" alt="Uncle Waffles" data-genre="amapiano">
        </div>
        <h3>Amapiano</h3>
      </div>

    </section>

  </main>
</body>
</html>
